# Agent definitions — one per line
# Format: LABEL | PROJECT_REL_PATH | SCRIPT | SCHEDULE_TYPE | SCHEDULE_VALUE | LOG_DIR_REL | EXTRA_ARGS
#
# PROJECT_REL_PATH: relative to ~/Documents/Projects/
# SCHEDULE_TYPE:    interval | calendar | calendar_multi
# SCHEDULE_VALUE:
#   interval       → seconds (e.g. 28800)
#   calendar       → H:MM or W:H:MM (W=weekday 0-6)
#   calendar_multi → W1:H:MM,W2:H:MM
# LOG_DIR_REL:     relative to the project dir
# EXTRA_ARGS:      passed to the script (optional)
#
# Lines starting with # are comments. Blank lines ignored.

# ─── Rivendell agents ───
com.sk.agent.rivendell.harvest   | rivendell | bin/sk-harvest-cron   | interval | 28800  | reports
com.sk.agent.rivendell.maintain  | rivendell | bin/sk-maintain-cron  | calendar | 22:00  | reports
com.sk.agent.rivendell.tester    | rivendell | bin/sk-tester-cron    | calendar | 6:00   | reports
com.sk.agent.rivendell.doctor    | rivendell | bin/sk-agent-doctor   | calendar | 7:00   | reports

# ─── News stock agents ───
com.sk.agent.news_stock.research-agent        | news_stock | scripts/research-agent.sh | calendar | 7:30  | reports | daily
com.sk.agent.news_stock.research-agent-weekly | news_stock | scripts/research-agent.sh | calendar | 0:10:00 | reports | weekly

# ─── Sales agents ───
com.sk.agent.sales.crm-projection   | sales-assistant | scripts/crm-projection.sh   | calendar | 7:00  | materials/clients
com.sk.agent.sales.material-health  | sales-assistant | scripts/material-health.sh  | calendar | 0:9:00 | materials
com.sk.agent.sales.subsidy-scraper  | sales-assistant | scripts/subsidy-scraper.sh  | calendar_multi | 1:8:00,4:8:00 | materials/subsidies
com.sk.agent.sales.tender-scraper   | sales-assistant | scripts/tender-scraper.sh   | calendar | 8:30  | materials/tenders

# ─── Autoresearch agents ───
# com.sk.agent.sales.autoresearch  | sales-assistant | sk-autoresearch-wrapper.sh | calendar | 0:2:00 | reports
# ↑ Uncomment when ready. Runs weekly Sunday 02:00. Wrapper script calls sk-autoresearch with the config.

# ─── Dashboard services ───
com.sk.dashboard.api | rivendell | dashboard-next/start-api.sh | keepalive | - | logs
com.sk.dashboard.web | rivendell | dashboard-next/start-web.sh | keepalive | - | logs

# ─── Watchdog (HTTP health check + auto-restart for hung-but-alive services) ───
com.sk.dashboard.watchdog | rivendell | bin/sk-watchdog | interval | 60 | reports
