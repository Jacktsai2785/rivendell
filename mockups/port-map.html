<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup — Port Map</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Geist', 'Inter', 'system-ui', 'sans-serif'],
            mono: ['Geist Mono', 'JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    * { box-sizing: border-box; }
    .ping { animation: ping 1.2s cubic-bezier(0,0,0.2,1) infinite; }
    @keyframes ping { 75%,100% { transform: scale(2); opacity: 0; } }
    .spin { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover td { background-color: rgba(113,113,122,0.08); }
    .badge-live   { background:#16a34a22; color:#4ade80; border:1px solid #16a34a55; }
    .badge-stopped{ background:#3f3f4622; color:#a1a1aa; border:1px solid #52525b55; }
    .badge-unknown{ background:#ca8a0422; color:#fbbf24; border:1px solid #ca8a0455; }
    .badge-loading{ background:#3b82f622; color:#60a5fa; border:1px solid #3b82f655; }
    html.light .badge-live   { background:#dcfce7; color:#16a34a; border:1px solid #86efac; }
    html.light .badge-stopped{ background:#f4f4f5; color:#71717a; border:1px solid #d4d4d8; }
    html.light .badge-unknown{ background:#fef9c3; color:#ca8a04; border:1px solid #fde047; }
  </style>
</head>

<body class="bg-zinc-950 text-zinc-100 font-sans antialiased min-h-screen flex dark:bg-zinc-950 dark:text-zinc-100">

<!-- ── Sidebar ─────────────────────────────────────────────────────────────── -->
<aside class="flex w-56 shrink-0 flex-col border-r border-zinc-800 bg-zinc-950 min-h-screen">
  <div class="px-4 py-6">
    <h1 class="text-lg font-bold tracking-tight text-zinc-100">sk-dashboard</h1>
  </div>
  <div class="px-3 pb-4">
    <select class="w-full rounded-md border border-zinc-700 bg-zinc-900 px-2.5 py-1.5 text-xs font-mono text-zinc-300">
      <option>🌐 全部專案</option>
      <option>📁 rivendell</option>
      <option>📁 nexus</option>
    </select>
  </div>
  <nav class="flex flex-col gap-1 px-2">
    <a href="#" class="flex items-center gap-3 rounded-md py-2 px-3 text-sm font-medium text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-100 transition-colors">
      <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      總覽
    </a>
    <a href="#" class="flex items-center gap-3 rounded-md py-2 px-3 text-sm font-medium text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-100 transition-colors">
      <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      專案管理
    </a>
    <a href="#" class="flex items-center gap-3 rounded-md py-2 pl-8 pr-3 text-[13px] font-medium text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-100 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
      Agent 管理
    </a>
    <a href="#" class="flex items-center gap-3 rounded-md py-2 pl-8 pr-3 text-[13px] font-medium text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-100 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      Token 用量
    </a>
    <a href="#" class="flex items-center gap-3 rounded-md py-2 px-3 text-sm font-medium text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-100 transition-colors">
      <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3l1.9 5.8H20l-5 3.6 1.9 5.8L12 15l-4.9 3.2 1.9-5.8-5-3.6h6.1z"/></svg>
      Skill 總覽
    </a>
    <a href="#" class="flex items-center gap-3 rounded-md py-2 px-3 text-sm font-medium bg-zinc-800 text-zinc-100 transition-colors">
      <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
      Port 對應
    </a>
  </nav>
</aside>

<!-- ── Main Content ────────────────────────────────────────────────────────── -->
<main class="flex-1 flex flex-col min-h-screen overflow-auto bg-white dark:bg-zinc-950">

  <!-- Top bar with theme toggle -->
  <div class="flex items-center justify-end px-6 py-3 border-b border-zinc-200 dark:border-zinc-800">
    <button onclick="toggleTheme()" class="flex items-center gap-1.5 rounded-md px-2.5 py-1.5 text-xs text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/50 transition-colors" title="切換主題">
      <svg id="theme-icon" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span id="theme-label">Light</span>
    </button>
  </div>

  <div class="px-8 py-6 flex-1">

    <!-- Page header -->
    <div class="flex items-start justify-between mb-5">
      <div>
        <h2 class="text-xl font-semibold text-zinc-900 dark:text-zinc-100">Port 對應</h2>
        <p class="mt-0.5 text-sm text-zinc-500">所有 Docker 服務的 host port 對應一覽</p>
      </div>
      <div class="flex items-center gap-3">
        <div id="status-summary" class="hidden items-center gap-3 text-xs text-zinc-500">
          <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-green-500 inline-block"></span><span id="live-count">0</span> live</span>
          <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-zinc-500 inline-block"></span><span id="stopped-count">0</span> stopped</span>
        </div>
        <button id="refresh-btn" onclick="refreshStatus()" class="flex items-center gap-2 rounded-md border border-zinc-700 bg-zinc-900 px-3 py-1.5 text-sm font-medium text-zinc-300 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <svg id="refresh-icon" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
          Refresh
        </button>
      </div>
    </div>

    <!-- Tab bar -->
    <div id="tab-bar" class="flex gap-1 mb-4 border-b border-zinc-200 dark:border-zinc-800">
      <!-- Tabs rendered by JS -->
    </div>

    <!-- Error banner -->
    <div id="error-banner" class="hidden mb-4 flex items-center gap-3 rounded-lg border border-red-800/50 bg-red-950/30 px-4 py-3 text-sm text-red-400">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>無法載入 docker-compose.yml — 請確認 dashboard-api 正在運行</span>
      <button onclick="document.getElementById('error-banner').classList.add('hidden')" class="ml-auto text-red-500 hover:text-red-300">✕</button>
    </div>

    <!-- Port table -->
    <div class="rounded-lg border border-zinc-200 dark:border-zinc-800 overflow-hidden bg-white dark:bg-zinc-900/30">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-zinc-200 dark:border-zinc-800">
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-zinc-500 w-24">Port</th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-zinc-500">服務</th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-zinc-500">Container</th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-zinc-500 w-24">類型</th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-zinc-500 w-28">狀態</th>
            <th class="px-4 py-3 w-10"></th>
          </tr>
        </thead>
        <tbody id="port-table-body" class="divide-y divide-zinc-100 dark:divide-zinc-800/60">
        </tbody>
      </table>
    </div>

    <p class="mt-3 text-xs text-zinc-600 dark:text-zinc-600">
      資料源：<code class="font-mono text-zinc-500">docker-compose.yml</code> · 狀態：port reachability check via dashboard-api
    </p>

  </div>
</main>

<!-- ── Mockup State Switcher ───────────────────────────────────────────────── -->
<div class="fixed bottom-4 right-4 flex flex-col gap-2 z-50">
  <div class="rounded-lg border border-zinc-700 bg-zinc-900 p-3 text-xs text-zinc-400 shadow-xl">
    <p class="mb-2 font-semibold text-zinc-300 text-[11px] uppercase tracking-wider">Mockup 狀態</p>
    <div class="flex flex-col gap-1.5">
      <button onclick="setState('loading')"   class="rounded px-2.5 py-1 hover:bg-zinc-700 text-left transition-colors">⏳ 載入中</button>
      <button onclick="setState('populated')" class="rounded px-2.5 py-1 hover:bg-zinc-700 text-left transition-colors">✅ 正常顯示</button>
      <button onclick="setState('all-live')"  class="rounded px-2.5 py-1 hover:bg-zinc-700 text-left transition-colors">🟢 全部 live</button>
      <button onclick="setState('mixed')"     class="rounded px-2.5 py-1 hover:bg-zinc-700 text-left transition-colors">🔀 混合狀態</button>
      <button onclick="setState('error')"     class="rounded px-2.5 py-1 hover:bg-zinc-700 text-left transition-colors">🔴 Error 狀態</button>
    </div>
  </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const SERVICES = [
  { port: 8000, service: 'dashboard-api',  container: 'sk-dashboard-api',  type: 'API',      web: true,  category: '後端',   project: 'dashboard'  },
  { port: 3000, service: 'dashboard-web',  container: 'sk-dashboard-web',  type: 'Frontend', web: true,  category: '前端',   project: 'dashboard'  },
  { port: 8001, service: 'news-stock',     container: 'sk-news-stock',      type: 'API',      web: true,  category: '後端',   project: 'news-stock' },
  { port: 3001, service: 'news-stock',     container: 'sk-news-stock',      type: 'Frontend', web: true,  category: '前端',   project: 'news-stock' },
  { port: 8501, service: 'news-stock',     container: 'sk-news-stock',      type: 'Streamlit',web: true,  category: '前端',   project: 'news-stock' },
  { port: 8002, service: 'sales',          container: 'sk-sales',           type: 'API',      web: true,  category: '後端',   project: 'sales'      },
  { port: 3002, service: 'sales',          container: 'sk-sales',           type: 'Frontend', web: true,  category: '前端',   project: 'sales'      },
  { port: 5432, service: 'nexus-postgres', container: 'sk-nexus-postgres',  type: 'DB',       web: false, category: '資料庫', project: 'nexus'      },
  { port: 6379, service: 'nexus-redis',    container: 'sk-nexus-redis',     type: 'Cache',    web: false, category: '資料庫', project: 'nexus'      },
  { port: 8003, service: 'nexus-backend',  container: 'sk-nexus-backend',   type: 'API',      web: true,  category: '後端',   project: 'nexus'      },
  { port: 3003, service: 'nexus-frontend', container: 'sk-nexus-frontend',  type: 'Frontend', web: true,  category: '前端',   project: 'nexus'      },
  { port: 3004, service: 'marketing-web',  container: 'sk-marketing-web',   type: 'Frontend', web: true,  category: '前端',   project: 'marketing'  },
];

const TABS = ['全部', '前端', '後端', '資料庫'];

// Stable statuses across tab switches
let currentStatuses = SERVICES.map(() => 'loading');
let activeTab = '全部';

// ── Scenarios ─────────────────────────────────────────────────────────────────
const SCENARIOS = {
  loading:    () => SERVICES.map(() => 'loading'),
  'all-live': () => SERVICES.map(() => 'live'),
  mixed:      () => SERVICES.map((s, i) => s.web ? (i % 3 === 2 ? 'stopped' : 'live') : 'stopped'),
  populated:  () => SERVICES.map((s, i) => s.web ? (i % 4 === 3 ? 'unknown' : 'live') : 'stopped'),
  error:      () => [],
};

// ── Tab bar ───────────────────────────────────────────────────────────────────
function renderTabs(statuses) {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = TABS.map(tab => {
    const count = tab === '全部'
      ? SERVICES.length
      : SERVICES.filter(s => s.category === tab).length;
    const isActive = tab === activeTab;
    return `
      <button onclick="setTab('${tab}')"
        class="px-3 py-2 text-sm font-medium border-b-2 transition-colors -mb-px ${
          isActive
            ? 'border-zinc-100 text-zinc-100 dark:border-zinc-100 dark:text-zinc-100'
            : 'border-transparent text-zinc-500 hover:text-zinc-300 hover:border-zinc-600'
        }">
        ${tab}
        <span class="ml-1.5 rounded-full px-1.5 py-0.5 text-[10px] font-medium ${
          isActive
            ? 'bg-zinc-700 text-zinc-300'
            : 'bg-zinc-800/60 text-zinc-500'
        }">${count}</span>
      </button>`;
  }).join('');
}

function setTab(tab) {
  activeTab = tab;
  renderTabs(currentStatuses);
  renderTable(currentStatuses);
  updateSummary(currentStatuses);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function filteredServices() {
  if (activeTab === '全部') return SERVICES;
  return SERVICES.filter(s => s.category === activeTab);
}

function badgeHTML(status) {
  const map = {
    live:    ['badge-live',    '<span class="relative flex w-2 h-2"><span class="ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-60"></span><span class="relative inline-flex rounded-full w-2 h-2 bg-green-500"></span></span>', 'live'],
    stopped: ['badge-stopped', '<span class="relative inline-flex rounded-full w-2 h-2 bg-zinc-500"></span>', 'stopped'],
    unknown: ['badge-unknown', '<span class="relative inline-flex rounded-full w-2 h-2 bg-yellow-400"></span>', 'unknown'],
    loading: ['badge-loading', '<svg class="spin w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>', '檢查中'],
  };
  const [cls, icon, label] = map[status] || map.unknown;
  return `<span class="inline-flex items-center gap-1.5 rounded-full px-2 py-0.5 text-[11px] font-medium ${cls}">${icon}${label}</span>`;
}

function typeChip(type) {
  const colors = {
    API:      'text-blue-400 bg-blue-950/40 border-blue-800/40',
    Frontend: 'text-violet-400 bg-violet-950/40 border-violet-800/40',
    Streamlit:'text-orange-400 bg-orange-950/40 border-orange-800/40',
    DB:       'text-zinc-400 bg-zinc-800/60 border-zinc-700/60',
    Cache:    'text-zinc-400 bg-zinc-800/60 border-zinc-700/60',
  };
  return `<span class="rounded px-1.5 py-0.5 text-[10px] font-mono border ${colors[type] || colors.DB}">${type}</span>`;
}

// ── Table render ──────────────────────────────────────────────────────────────
function renderTable(statuses) {
  const tbody = document.getElementById('port-table-body');
  if (!statuses || statuses.length === 0) { tbody.innerHTML = ''; return; }

  const visible = filteredServices();

  // Group by project, preserving insertion order
  const groups = [];
  const seen = new Map();
  for (const s of visible) {
    if (!seen.has(s.project)) {
      seen.set(s.project, []);
      groups.push(s.project);
    }
    seen.get(s.project).push(s);
  }

  const rows = [];
  groups.forEach((project, gi) => {
    const items = seen.get(project);
    const count = items.length;

    // Project header row
    rows.push(`
      <tr class="${gi > 0 ? 'border-t-2 border-zinc-300/30 dark:border-zinc-700/60' : ''}">
        <td colspan="6" class="px-4 py-2 bg-zinc-100/60 dark:bg-zinc-800/40">
          <div class="flex items-center gap-2">
            <svg class="w-3.5 h-3.5 text-zinc-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="text-xs font-semibold text-zinc-600 dark:text-zinc-300">${project}</span>
            <span class="text-[10px] text-zinc-500">${count} port${count > 1 ? 's' : ''}</span>
          </div>
        </td>
      </tr>`);

    // Service rows
    items.forEach(s => {
      const globalIdx = SERVICES.indexOf(s);
      const status = statuses[globalIdx] || 'unknown';
      const clickable = s.web && status !== 'loading';

      const linkIcon = s.web
        ? `<a href="http://localhost:${s.port}" target="_blank" onclick="event.stopPropagation()"
             class="flex items-center justify-center w-7 h-7 rounded-md text-zinc-600 hover:text-zinc-300 hover:bg-zinc-700/60 transition-colors"
             title="開啟 localhost:${s.port}">
             <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
               <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
               <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
             </svg>
           </a>`
        : `<span class="flex items-center justify-center w-7 h-7 text-zinc-700" title="非 HTTP 服務">
             <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
               <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
             </svg>
           </span>`;

      rows.push(`
        <tr class="${clickable ? 'clickable' : ''}" ${clickable ? `onclick="openPort(${s.port})"` : ''}>
          <td class="px-4 py-3 font-mono text-sm font-semibold text-zinc-200">${s.port}</td>
          <td class="px-4 py-3 text-sm text-zinc-300">${s.service}</td>
          <td class="px-4 py-3 font-mono text-xs text-zinc-500">${s.container}</td>
          <td class="px-4 py-3">${typeChip(s.type)}</td>
          <td class="px-4 py-3">${badgeHTML(status)}</td>
          <td class="px-4 py-2">${linkIcon}</td>
        </tr>`);
    });
  });

  tbody.innerHTML = rows.join('');
}

function updateSummary(statuses) {
  if (!statuses || statuses.length === 0) return;
  const visible = filteredServices();
  const liveCount    = visible.filter(s => statuses[SERVICES.indexOf(s)] === 'live').length;
  const stoppedCount = visible.filter(s => statuses[SERVICES.indexOf(s)] === 'stopped').length;
  document.getElementById('live-count').textContent    = liveCount;
  document.getElementById('stopped-count').textContent = stoppedCount;
  document.getElementById('status-summary').classList.remove('hidden');
  document.getElementById('status-summary').classList.add('flex');
}

// ── State management ──────────────────────────────────────────────────────────
function setState(state) {
  document.getElementById('error-banner').classList.add('hidden');
  document.getElementById('status-summary').classList.add('hidden');

  if (state === 'error') {
    currentStatuses = [];
    renderTabs(currentStatuses);
    renderTable(currentStatuses);
    document.getElementById('error-banner').classList.remove('hidden');
    return;
  }

  currentStatuses = SCENARIOS[state]();
  renderTabs(currentStatuses);
  renderTable(currentStatuses);
  if (state !== 'loading') updateSummary(currentStatuses);
}

function refreshStatus() {
  const btn  = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  btn.classList.add('opacity-50');
  icon.classList.add('spin');
  document.getElementById('status-summary').classList.add('hidden');

  currentStatuses = SERVICES.map(() => 'loading');
  renderTable(currentStatuses);

  setTimeout(() => {
    currentStatuses = SCENARIOS.mixed();
    renderTabs(currentStatuses);
    renderTable(currentStatuses);
    updateSummary(currentStatuses);
    btn.disabled = false;
    btn.classList.remove('opacity-50');
    icon.classList.remove('spin');
  }, 1800);
}

function openPort(port) {
  window.open(`http://localhost:${port}`, '_blank');
}

// ── Theme toggle ──────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.classList.toggle('dark');
  html.classList.toggle('light', !isDark);
  document.getElementById('theme-label').textContent = isDark ? 'Light' : 'Dark';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  document.body.classList.toggle('bg-zinc-950', isDark);
  document.body.classList.toggle('text-zinc-100', isDark);
  document.body.classList.toggle('bg-zinc-50', !isDark);
  document.body.classList.toggle('text-zinc-900', !isDark);
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderTabs([]);
setState('loading');
setTimeout(() => setState('mixed'), 600);
</script>
</body>
</html>
