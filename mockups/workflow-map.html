    html.light .chip-orphan-a { background:#fef9c3; color:#d97706; border:1px solid #fde68a; }
    html.light .chip-maint    { background:#e0e7ff; color:#4338ca; border:1px solid #c7d2fe; }

    .search-dim { opacity:.12; }
    .search-hit { outline:2px solid #fbbf24; outline-offset:1px; border-radius:4px; }

    details > summary { list-style:none; cursor:pointer; }
    details > summary::-webkit-details-marker { display:none; }
    details > summary .chevron { transition: transform .2s; }
    details[open] > summary .chevron { transform: rotate(90deg); }

    .step-row { display:flex; gap:10px; align-items:flex-start; padding:8px 0; border-bottom:1px solid rgba(113,113,122,.12); }

    .step-num { display:flex; align-items:center; justify-content:center; min-width:22px; height:22px; border-radius:50%; background:rgba(113,113,122,.2); font-size:11px; font-weight:600; color:#a1a1aa; flex-shrink:0; margin-top:1px; }
    .step-skills { display:flex; flex-wrap:wrap; gap:4px; }

    body.edit-mode .edit-controls { display:flex; }
    body.edit-mode .edit-mode-hide { display:none; }

    .skill-autocomplete { position:absolute; top:100%; left:0; right:0; background:#18181b; border:1px solid #3f3f46; border-radius:6px; z-index:50; max-height:160px; overflow-y:auto; }

    </section>

      </div>

    </section>

// ── State ──────────────────────────────────────────────────────────────────

let state = loadState();

function loadState() {
  try {
    const saved = localStorage.getItem('workflow-map-data');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveState() {
  localStorage.setItem('workflow-map-data', JSON.stringify(state));
}

// ── Helpers ────────────────────────────────────────────────────────────────

function chipClass(skill, mandatory) {
  const meta = state.skillMeta[skill] || { source:'local' };
  if (meta.source === 'gstack') return mandatory ? 'chip-gstack-m' : 'chip-gstack-o';
  return mandatory ? 'chip-local-m' : 'chip-local-o';
}

function chipHtml(skill, mandatory = true, extraClass = '') {
  const meta = state.skillMeta[skill] || {};
  const cls = extraClass || chipClass(skill, mandatory);
  const desc = (meta.desc || '').replace(/"/g,'&quot;');
  return `<span class="chip ${cls} tooltip-wrap" data-skill="${skill}">
    /${skill}
    ${desc ? `<span class="tooltip-box">${meta.desc}</span>` : ''}
  </span>`;
}

function allMappedSkills() {
  const mapped = new Set();
  for (const tr of state.tracks) for (const s of tr.steps) {
    [...s.mandatory, ...s.optional].forEach(sk => mapped.add(sk));
  }
  for (const m of state.maintenance) m.skills.forEach(sk => mapped.add(sk));
  for (const df of state.domainFlows) for (const s of df.steps) s.skills.forEach(sk => mapped.add(sk));
  for (const sit of state.situational) sit.skills.forEach(sk => mapped.add(sk));
  for (const o of state.orphaned) mapped.add(o.skill);
  return mapped;
}

                <div class="step-skills">
                  ${s.mandatory.map(sk => chipHtml(sk, true)).join('')}
                  ${s.optional.map(sk => chipHtml(sk, false)).join('')}
                  ${(!s.mandatory.length && !s.optional.length) ? '<span class="text-xs text-zinc-600 italic">（無特定 skill）</span>' : ''}
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </details>
    </div>
  `).join('');
}

function renderMaintenance() {
  document.getElementById('maintenance-table').innerHTML = state.maintenance.map(m => `
    <div class="flex items-center gap-3 py-1.5" data-step="maint-${m.trigger}">
      <span class="text-xs text-zinc-500 w-44 shrink-0">${m.trigger}</span>
      <div class="step-skills flex-wrap flex gap-1.5">
        ${m.skills.map(sk => chipHtml(sk, true, 'chip-maint')).join('')}
      </div>
    </div>
  `).join('');
}

function renderDomainFlows() {
  const container = document.getElementById('domain-flows');
  const editMode = document.body.classList.contains('edit-mode');

  container.innerHTML = state.domainFlows.map((flow, fi) => `
    <div class="rounded-lg border border-zinc-800 bg-zinc-900/30 overflow-hidden" data-flow-idx="${fi}">
      <details open data-group="domain">
        <summary class="flex items-center gap-2 px-4 py-3 bg-zinc-900/50 cursor-pointer select-none">
          <span class="chevron text-zinc-500">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          </span>
          <span class="text-sm">${flow.icon}</span>
          <span class="text-sm font-semibold text-zinc-200" ${editMode ? `contenteditable="true" onblur="updateFlowLabel(${fi},this.textContent)"` : ''}>${flow.label}</span>
          <span class="ml-auto flex items-center gap-2">
            <span class="text-xs text-zinc-500">${flow.steps.length} steps</span>
            <button onclick="event.stopPropagation(); deleteFlow(${fi})" class="edit-controls items-center text-zinc-600 hover:text-red-400 transition-colors p-0.5" title="刪除此工作流程">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </span>
        </summary>
        <div class="px-4 py-2">
          ${flow.steps.map((s, si) => `
            <div class="step-row" data-step="domain-${fi}-${si}">
              <span class="step-num">${s.num}</span>
              <div class="flex-1 min-w-0">
                <div class="text-xs font-medium text-zinc-300 mb-1">
                  <span ${editMode ? `contenteditable="true" onblur="updateStepLabel(${fi},${si},this.textContent)"` : ''}>${s.label}</span>
                  ${s.desc ? `<span class="text-zinc-600 font-normal ml-1">— <span ${editMode ? `contenteditable="true" onblur="updateStepDesc(${fi},${si},this.textContent)"` : ''}>${s.desc}</span></span>` : ''}
                </div>
                <div class="step-skills">
                  ${s.skills.map(sk => `
                    <span class="inline-flex items-center gap-0.5">
                      ${chipHtml(sk, true)}
                      ${editMode ? `<button onclick="removeSkillFromStep(${fi},${si},'${sk}')" class="text-zinc-600 hover:text-red-400 ml-0.5 text-xs leading-none">×</button>` : ''}
                    </span>
                  `).join('')}
                  ${editMode ? `
                    <span class="skill-input-wrap">
                      <input type="text" placeholder="+ skill" oninput="showAC(this,${fi},${si})" onfocus="showAC(this,${fi},${si})" onblur="hideAC(this,300)"
                        class="inline-block w-20 rounded px-1.5 py-0.5 text-xs bg-zinc-800 border border-zinc-700 text-zinc-300 focus:outline-none focus:border-violet-500">
                      <div class="skill-autocomplete hidden"></div>
                    </span>
                  ` : ''}
                </div>
              </div>
              ${editMode ? `<button onclick="deleteStep(${fi},${si})" class="text-zinc-600 hover:text-red-400 transition-colors ml-2 shrink-0" title="刪除步驟">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>` : ''}
            </div>
          `).join('')}
          ${editMode ? `
            <div class="pt-2">
              <button onclick="addStep(${fi})" class="flex items-center gap-1 text-xs text-zinc-500 hover:text-zinc-300 transition-colors py-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                新增步驟
              </button>
            </div>
          ` : ''}
        </div>
      </details>
    </div>
  `).join('');
}

function renderSituational() {
  document.getElementById('situational-grid').innerHTML = state.situational.map((s, si) => `
    <div class="trigger-row" data-trigger-idx="${si}">
      <div class="flex items-center gap-2 mb-2">
        <span class="text-base">${s.icon}</span>
        <span class="text-xs font-medium text-zinc-300">${s.trigger}</span>
      </div>
      <div class="flex flex-wrap gap-1.5">
        ${s.skills.map(sk => chipHtml(sk, true, 'chip-local-m')).join('')}
      </div>
    </div>
  `).join('');
}

function renderOrphaned() {
  document.getElementById('orphaned-list').innerHTML = state.orphaned.map(o => `
    <div class="flex flex-col gap-1 tooltip-wrap">
      <span class="chip ${o.severity === 'red' ? 'chip-orphan-r' : 'chip-orphan-a'}" data-skill="${o.skill}">/${o.skill}</span>
      <span class="text-xs text-zinc-600 max-w-[180px] leading-tight">${o.reason}</span>
    </div>
  `).join('');
}

function renderAll() {
  renderStats();
  renderTracks();
  renderMaintenance();
  renderDomainFlows();
  renderSituational();
  renderOrphaned();
}

// ── Search ──────────────────────────────────────────────────────────────────

function onSearch(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('[data-skill]').forEach(el => {
    const name = el.dataset.skill || '';
    const match = !q || name.includes(q);
    el.classList.toggle('search-dim', !match);
    el.classList.toggle('search-hit', !!(match && q));
  });
  // dim steps with no matches
  document.querySelectorAll('[data-step]').forEach(row => {
    if (!q) { row.style.opacity = ''; return; }
    const hasMatch = [...row.querySelectorAll('[data-skill]')].some(c => !c.classList.contains('search-dim'));
    row.style.opacity = hasMatch ? '' : '0.3';
  });
}

// ── Edit Mode ───────────────────────────────────────────────────────────────

function toggleEditMode() {
  const active = document.body.classList.toggle('edit-mode');
  const btn = document.getElementById('edit-btn');
  btn.classList.toggle('bg-violet-900/40', active);
  btn.classList.toggle('border-violet-600', active);
  btn.classList.toggle('text-violet-300', active);
  renderDomainFlows();
}

function updateFlowLabel(fi, val) {
  state.domainFlows[fi].label = val.trim();
  saveState();
}
function updateStepLabel(fi, si, val) {
  state.domainFlows[fi].steps[si].label = val.trim();
  saveState();
}
function updateStepDesc(fi, si, val) {
  state.domainFlows[fi].steps[si].desc = val.trim();
  saveState();
}

function deleteFlow(fi) {
  if (!confirm(`刪除「${state.domainFlows[fi].label}」？`)) return;
  state.domainFlows.splice(fi, 1);
  saveState(); renderDomainFlows(); renderStats();
}

function addStep(fi) {
  const flow = state.domainFlows[fi];
  flow.steps.push({ num: flow.steps.length + 1, label:'新步驟', desc:'', skills:[] });
  saveState(); renderDomainFlows();
}

function deleteStep(fi, si) {
  state.domainFlows[fi].steps.splice(si, 1);
  state.domainFlows[fi].steps.forEach((s, i) => s.num = i + 1);
  saveState(); renderDomainFlows();
}

function removeSkillFromStep(fi, si, skill) {
  const step = state.domainFlows[fi].steps[si];
  step.skills = step.skills.filter(s => s !== skill);
  saveState(); renderDomainFlows();
}

function addDomainFlow() {
  state.domainFlows.push({
    id: 'flow-' + Date.now(),
    label: '新工作流程',
    icon: '📌',
    steps: [{ num:1, label:'步驟一', desc:'', skills:[] }]
  });
  saveState(); renderDomainFlows(); renderStats();
  // scroll to end
  setTimeout(() => document.getElementById('domain-flows').lastElementChild?.scrollIntoView({ behavior:'smooth' }), 50);
}

// ── Autocomplete ────────────────────────────────────────────────────────────

let acTarget = null;

function showAC(input, fi, si) {
  acTarget = { fi, si, input };
  const q = input.value.toLowerCase();
  const allSkills = Object.keys(state.skillMeta).sort();
  const matches = allSkills.filter(s => s.includes(q) && !state.domainFlows[fi].steps[si].skills.includes(s));
  const box = input.nextElementSibling;
  if (!matches.length) { box.classList.add('hidden'); return; }
  box.classList.remove('hidden');
  box.innerHTML = matches.slice(0, 12).map(s => `
    <div class="skill-ac-item" onmousedown="event.preventDefault(); addSkillToStep(${fi},${si},'${s}')">${s}</div>
  `).join('');
}

function hideAC(input, delay = 0) {
  setTimeout(() => {
    const box = input?.nextElementSibling;
    if (box) box.classList.add('hidden');
    if (input) input.value = '';
  }, delay);
}

function addSkillToStep(fi, si, skill) {
  const step = state.domainFlows[fi].steps[si];
  if (!step.skills.includes(skill)) step.skills.push(skill);
  saveState(); renderDomainFlows();
}

// ── Collapse / Expand ────────────────────────────────────────────────────────

function expandAll(group) {
  document.querySelectorAll(`details[data-group="${group}"]`).forEach(d => d.open = true);
}
function collapseAll(group) {
  document.querySelectorAll(`details[data-group="${group}"]`).forEach(d => d.open = false);
}

// ── Theme ────────────────────────────────────────────────────────────────────

function toggleTheme() {
  const html = document.documentElement;
  const light = html.classList.toggle('light');
  html.classList.toggle('dark', !light);
  document.getElementById('theme-label').textContent = light ? 'Dark' : 'Light';
  document.getElementById('theme-icon').innerHTML = light
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  document.body.classList.toggle('bg-zinc-950', !light);
  document.body.classList.toggle('text-zinc-100', !light);
  document.body.classList.toggle('bg-white', light);
  document.body.classList.toggle('text-zinc-900', light);
}

// ── Export / Import ──────────────────────────────────────────────────────────

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'workflow-map-data.json';
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      state = JSON.parse(e.target.result);
      saveState();
      renderAll();
      alert('✅ 匯入成功');
    } catch(err) {
      alert('❌ JSON 格式錯誤');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── Init ─────────────────────────────────────────────────────────────────────

renderAll();
</script>

</body>
</html>
