# rivendell/docker-compose.yml — Root orchestrator
# Usage: docker compose --profile <name> [--profile <name>] up -d
#
# Profiles: dashboard, news-stock, sales, nexus, marketing
# Set PROJECTS_DIR to override default sibling directory layout.

services:

  # === rivendell dashboard (profile: dashboard) ===

  dashboard-api:
    profiles: ["dashboard"]
    build:
      context: ./dashboard-next/api
      dockerfile: ../../dockerfiles/dashboard-api.Dockerfile
    container_name: sk-dashboard-api
    ports:
      - "8000:8000"
    volumes:
      - ./reports:/data/reports:ro
      - ./logs:/data/logs:ro
      - ./data:/data/data:ro
    restart: unless-stopped

  dashboard-web:
    profiles: ["dashboard"]
    build:
      context: ./dashboard-next
      dockerfile: ../dockerfiles/dashboard-web.Dockerfile
    container_name: sk-dashboard-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - dashboard-api
    restart: unless-stopped

  # === news_stock (profile: news-stock) ===

  news-stock:
    profiles: ["news-stock"]
    build:
      context: ${PROJECTS_DIR:-..}/news_stock
      dockerfile: Dockerfile
    container_name: sk-news-stock
    ports:
      - "8001:8000"
      - "3001:3000"
      - "8501:8501"
    env_file:
      - path: ${PROJECTS_DIR:-..}/news_stock/.env
        required: false
    environment:
      - ENABLE_SCHEDULERS=${NEWS_ENABLE_SCHEDULERS:-false}
    volumes:
      - news-stock-data:/app/data
    restart: unless-stopped

  # === sales-assistant (profile: sales) ===

  sales:
    profiles: ["sales"]
    build:
      context: ${PROJECTS_DIR:-..}/sales-assistant
      dockerfile: Dockerfile
    container_name: sk-sales
    ports:
      - "8002:8002"
      - "3002:3002"
    env_file:
      - path: ${PROJECTS_DIR:-..}/sales-assistant/.env
        required: false
    volumes:
      - sales-data:/app/data
    restart: unless-stopped

  # === nexus-ai-company (profile: nexus) ===

  nexus-postgres:
    profiles: ["nexus"]
    image: postgres:16-alpine
    container_name: sk-nexus-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${NEXUS_PG_PASSWORD:-nexus_dev}
    volumes:
      - nexus-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nexus-redis:
    profiles: ["nexus"]
    image: redis:7-alpine
    container_name: sk-nexus-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nexus-backend:
    profiles: ["nexus"]
    build:
      context: ${PROJECTS_DIR:-..}/nexus-ai-company/backend
    container_name: sk-nexus-backend
    ports:
      - "8003:8000"
    env_file:
      - path: ${PROJECTS_DIR:-..}/nexus-ai-company/.env
        required: false
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:${NEXUS_PG_PASSWORD:-nexus_dev}@nexus-postgres:5432/nexus
      - REDIS_URL=redis://nexus-redis:6379/0
    depends_on:
      nexus-postgres: { condition: service_healthy }
      nexus-redis: { condition: service_healthy }
    restart: unless-stopped

  nexus-frontend:
    profiles: ["nexus"]
    build:
      context: ${PROJECTS_DIR:-..}/nexus-ai-company/frontend
    container_name: sk-nexus-frontend
    ports:
      - "3003:3000"
    environment:
      - VITE_API_URL=http://localhost:8003
    depends_on:
      - nexus-backend
    restart: unless-stopped

  # === Marketing-Pal web (profile: marketing) ===

  marketing-web:
    profiles: ["marketing"]
    build:
      context: ${PROJECTS_DIR:-..}/Marketing-Pal/web
      dockerfile: ${PWD}/dockerfiles/marketing-web.Dockerfile
    container_name: sk-marketing-web
    ports:
      - "3004:3000"
    restart: unless-stopped

volumes:
  news-stock-data:
  sales-data:
  nexus-pgdata:
