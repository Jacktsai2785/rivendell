# rivendell/docker-compose.yml — Root orchestrator
# Usage: docker compose --profile <name> [--profile <name>] up -d
#
# Profiles: dashboard, news-stock, sales, marketing
# Set PROJECTS_DIR to override default sibling directory layout.

services:

  # === rivendell dashboard (profile: dashboard) ===

  dashboard-api:
    profiles: ["dashboard"]
    build:
      context: .
      dockerfile: dockerfiles/dashboard-api.Dockerfile
    container_name: sk-dashboard-api
    environment:
      - REPORTS_DIR=/data/reports
      - COMPOSE_FILE=/app/docker-compose.yml
    ports:
      - "8000:8000"
    volumes:
      - ./reports:/data/reports
      - ./logs:/data/logs:ro
      - ./data:/dashboard/data
      - ./data/skill-summaries-zh.tsv:/data/skill-summaries-zh.tsv:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ${HOME}/Library/LaunchAgents:/root/Library/LaunchAgents:ro
      - ${HOME}/.claude/projects:/root/.claude/projects:ro
      - ${HOME}/.claude/skills:/root/.claude/skills:ro
      - ./skills:/Users/manibari/code/rivendell/skills:ro
      - ${PROJECTS_DIR:-/Users/manibari/code}/gstack:/Users/manibari/code/gstack:ro
    restart: unless-stopped

  dashboard-web:
    profiles: ["dashboard"]
    build:
      context: ./dashboard-next
      dockerfile: ../dockerfiles/dashboard-web.Dockerfile
    container_name: sk-dashboard-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - dashboard-api
    restart: unless-stopped

  # === news_stock (profile: news-stock) ===

  news-stock:
    profiles: ["news-stock"]
    build:
      context: ${PROJECTS_DIR:-..}/news_stock
      dockerfile: Dockerfile
    container_name: sk-news-stock
    ports:
      - "8001:8000"
      - "3001:3000"
      - "8501:8501"
    env_file:
      - path: ${PROJECTS_DIR:-..}/news_stock/.env
        required: false
    environment:
      - ENABLE_SCHEDULERS=${NEWS_ENABLE_SCHEDULERS:-false}
    volumes:
      - news-stock-data:/app/data
    restart: unless-stopped

  # === sales-assistant (profile: sales) ===

  sales:
    profiles: ["sales"]
    build:
      context: ${PROJECTS_DIR:-..}/sales-assistant
      dockerfile: Dockerfile
    container_name: sk-sales
    ports:
      - "8002:8002"
      - "3002:3002"
    env_file:
      - path: ${PROJECTS_DIR:-..}/sales-assistant/.env
        required: false
    volumes:
      - sales-data:/app/data
    restart: unless-stopped

  # === Marketing-Pal web (profile: marketing) ===

  marketing-web:
    profiles: ["marketing"]
    build:
      context: ${PROJECTS_DIR:-..}/Marketing-Pal/web
      dockerfile: ${PWD}/dockerfiles/marketing-web.Dockerfile
    container_name: sk-marketing-web
    ports:
      - "3004:3000"
    restart: unless-stopped

volumes:
  news-stock-data:
  sales-data:
