# Deployment profile definitions
# Format: [profile_name] section header, then entries:
#   project             | GIT_URL | COMPOSE_PROFILE | LOCAL_DIR
#   agents              | LABEL_PREFIX  (matches agents.conf labels)
#   option              | KEY | VALUE
#   external_skill_pack | NAME | GIT_URL | SETUP_CMD
#
# project:
#   GIT_URL "." means rivendell itself (dashboard, etc.)
#   LOCAL_DIR is relative to ~/Documents/Projects/
#   COMPOSE_PROFILE maps to docker compose --profile value
#
# agents:
#   LABEL_PREFIX filters agents.conf by prefix match
#
# external_skill_pack:
#   clones GIT_URL → ~/.claude/skills/NAME (shallow), then runs SETUP_CMD
#   from inside the cloned dir. Skips if a symlink already exists at the
#   target (treats as dev install). SETUP_CMD is optional — leave blank
#   if no setup script.

# ─── Full dev machine (everything) ───
[dev-full]
option              | description | Full development environment (macOS)
project             | https://github.com/manibari/news.git             | news-stock | news_stock
project             | https://github.com/manibari/sales-assistant.git   | sales      | sales-assistant
project             | https://github.com/manibari/nexus-ai-company.git  | nexus      | nexus-ai-company
project             | https://github.com/manibari/Marketing-Pal.git     | marketing  | Marketing-Pal
project             | .                                                  | dashboard  | .
external_skill_pack | gstack | https://github.com/garrytan/gstack.git | ./setup
agents              | com.sk.agent.rivendell
agents              | com.sk.agent.news_stock
agents              | com.sk.agent.sales
agents              | com.sk.dashboard

# ─── Server: stock system only ───
[server-stock]
option  | description | News/stock analysis server
project | https://github.com/manibari/news.git | news-stock | news_stock
project | .                                     | dashboard  | .

# ─── Server: sales system only ───
[server-sales]
option  | description | Sales assistant server
project | https://github.com/manibari/sales-assistant.git | sales     | sales-assistant
project | .                                                | dashboard | .

# ─── Server: all services ───
[server-all]
option  | description | All services on server
project | https://github.com/manibari/news.git             | news-stock | news_stock
project | https://github.com/manibari/sales-assistant.git   | sales      | sales-assistant
project | https://github.com/manibari/nexus-ai-company.git  | nexus      | nexus-ai-company
project | .                                                  | dashboard  | .

# ─── Minimal: rivendell dashboard + skills only ───
[minimal]
option              | description | Skills library + dashboard only
project             | . | dashboard | .
external_skill_pack | gstack | https://github.com/garrytan/gstack.git | ./setup
agents              | com.sk.agent.rivendell
